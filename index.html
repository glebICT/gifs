<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Halloween GIF animation projects</title>
    <meta name="description" content="Halloween GIF animations created by 5th grade students using GIMP." />
    <link rel="stylesheet" href="styles.css" />
    <!-- Set theme before paint to avoid a flash of the wrong theme -->
    <script>
      (function () {
        var saved = localStorage.getItem("theme");
        if (saved === "light" || saved === "dark") {
          document.documentElement.setAttribute("data-theme", saved);
        }
      })();
    </script>
    <script src="script.js" defer></script>
  </head>
  <body>
    <header>
      <button
        id="theme-toggle"
        type="button"
        class="theme-toggle"
        aria-label="Toggle light and dark theme"
        title="Toggle light/dark theme"
      >
        <span class="theme-toggle__icon" aria-hidden="true"></span>
      </button>
      <h1>Halloween GIF animation projects</h1>
      <p class="subtitle">Spooky animations created by 5th grade students using GIMP 🎃</p>
    </header>

    <main>
      <div id="calendar-container">
        <p class="status">Loading projects…</p>
      </div>
    </main>

    <footer>
      <p>Made by 5th grade students 👻</p>
    </footer>
  </body>
</html>
